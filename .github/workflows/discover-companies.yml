name: Job Autopilot — Discover Companies

on:
  workflow_dispatch:  # manual trigger only
  schedule:
    - cron: '0 6 * * 0'  # every Sunday 6am UTC = Saturday midnight PT

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Discover companies from sitemaps
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node discover-companies.js
