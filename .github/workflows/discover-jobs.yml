name: Job Autopilot — Discover Jobs

on:
  schedule:
    - cron: '0 14 * * *'  # 2pm UTC = 7am PT daily
  workflow_dispatch:
    inputs:
      method:
        description: 'Which method to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - api-only
          - search-only
      enable_site_search:
        description: 'Run the SerpApi site: search too? Costs 28 extra calls — see cost note in discover-jobs.js. Leave false on the free plan unless you mean to use it.'
        required: false
        default: false
        type: boolean

jobs:
  discover-api:
    name: Discover via ATS APIs (free, no key needed)
    runs-on: ubuntu-latest
    timeout-minutes: 25   # was 15 — bumped for the 3 new sources (SmartRecruiters, Workable, Workday)
    if: ${{ github.event.inputs.method != 'search-only' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install

      - name: Run API discovery
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node discover-jobs-api.js

  discover-search:
    name: Discover via Search APIs (Adzuna + JSearch + SerpApi)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.inputs.method != 'api-only' }}
    needs: discover-api  # run after API discovery so we can compare

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install

      - name: Run search discovery
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          # On the scheduled (cron) run there's no workflow_dispatch input,
          # so this defaults to unset/false — the expensive site search only
          # runs when someone deliberately triggers it manually with the box checked.
          ENABLE_SITE_SEARCH: ${{ github.event.inputs.enable_site_search || 'false' }}
        run: node discover-jobs.js
